version: "3.8"

services:
  agroriesgo:
    build: .
    container_name: agroriesgo-peravia
    restart: unless-stopped
    ports:
      - "8502:8501"
    volumes:
      - agroriesgo_data:/app/data
    environment:
      - TZ=America/Santo_Domingo
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  agroriesgo_data:
    driver: local
